<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jale AI - asistan.turklawai.com</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="logo">
            <div class="logo-icon">J</div>
            <span>JALE AI</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="nav-item active" data-tab="chat-tab">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" />
            </svg>
            <span>Mesajlaşma</span>
          </button>
          <button class="nav-item" data-tab="tools-tab">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m16 18 6-6-6-6" />
              <path d="m8 6-6 6 6 6" />
            </svg>
            <span>Araç Envanteri</span>
          </button>
          <button class="nav-item" data-tab="swarm-tab">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2v10" />
              <path d="m16 8-4 4-4-4" />
              <path d="M4.5 9a3.5 3.5 0 0 1 0 7" />
              <path d="M19.5 9a3.5 3.5 0 0 0 0 7" />
            </svg>
            <span>Visible Swarm</span>
          </button>
        </nav>
        <div class="sidebar-footer">
          <button id="theme-btn" class="theme-toggle">
            <div class="theme-icon">🌙</div>
            <span id="theme-text">Koyu Tema</span>
          </button>
        </div>
      </aside>

      <main class="main-content">
        <section id="chat-tab" class="tab-pane active">
          <header class="tab-header">
            <div class="header-info">
              <h2>Sohbet</h2>
              <p>Jale ile iletişim merkezi</p>
            </div>
          </header>
          <div class="chat-container">
            <div id="chat-history" class="chat-history">
              <div class="chat-message agent-message initial-animation">
                <div class="message-content">
                  <p>
                    Merhaba! Ben Jale. Sisteminizdeki tüm ajanları ve araçları buradan
                    yönetebilirim. Size nasıl yardımcı olabilirim?
                  </p>
                </div>
              </div>
            </div>
            <div class="typing-indicator hidden" id="typing-indicator">
              <span></span><span></span><span></span>
            </div>
            <footer class="chat-input-area">
              <form id="chat-form" class="input-form">
                <input
                  type="text"
                  id="chat-input"
                  placeholder="Jale'ye bir şey sor..."
                  required
                  autocomplete="off"
                />
                <button type="submit" class="send-btn">
                  <svg
                    xmlns="http://www.w3.org/2000/svg"
                    width="18"
                    height="18"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <line x1="22" y1="2" x2="11" y2="13" />
                    <polygon points="22 2 15 22 11 13 2 9 22 2" />
                  </svg>
                </button>
              </form>
            </footer>
          </div>
        </section>

        <section id="tools-tab" class="tab-pane">
          <header class="tab-header">
            <div class="header-info">
              <h2>Araç Envanteri</h2>
              <p>Sistem yetenekleri ve CLI araçları</p>
            </div>
          </header>
          <div class="tools-grid" id="tools-grid"></div>
        </section>

        <section id="swarm-tab" class="tab-pane">
          <header class="tab-header">
            <div class="header-info">
              <h2>Visible Swarm</h2>
              <p>Aktif ajan durumu ve model dağılımı</p>
            </div>
          </header>
          <div class="agents-list" id="agents-list"></div>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
