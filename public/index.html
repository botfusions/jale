<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JALE - AI Asistan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="chat-header">
        <div class="header-content">
          <div class="avatar-container">
            <div class="avatar">
              <span>J</span>
            </div>
            <div class="status-indicator"></div>
          </div>
          <div class="agent-info">
            <h1>J.A.L.E.</h1>
            <p>Yapay Zeka Yönetici Asistanı</p>
          </div>
        </div>
        <div class="header-actions">
          <button id="theme-btn" class="icon-btn" title="Temayı Değiştir">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
            </svg>
          </button>
        </div>
      </header>

      <!-- Chat Box -->
      <main class="chat-main" id="chat-container">
        <div class="chat-history" id="chat-history">
          <!-- Initial Message -->
          <div class="chat-message agent-message initial-animation">
            <div class="message-content">
              <p>Merhaba! Ben Jale. Size nasıl yardımcı olabilirim?</p>
            </div>
          </div>
        </div>

        <!-- Typing Indicator -->
        <div class="typing-indicator hidden" id="typing-indicator">
          <span></span><span></span><span></span>
        </div>
      </main>

      <!-- Input Area -->
      <footer class="chat-footer">
        <form id="chat-form" class="input-form">
          <input
            type="text"
            id="chat-input"
            placeholder="Mesajınızı yazın..."
            autocomplete="off"
            required
          />
          <button type="submit" id="send-btn" class="send-btn" aria-label="Gönder">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </form>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
